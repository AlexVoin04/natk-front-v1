server {
  listen 80;
  server_name _;

  client_max_body_size 100m;

  root /usr/share/nginx/html;
  index index.html;

  # Прокси на API (внутри docker-сети natk-net)
  location /api/ {
    client_max_body_size 100m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://natk-api:8080;
  }

  # Прокси на AUTH (внутри docker-сети natk-net)
  location /auth/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://natk-auth:8080;
  }

  # SPA fallback (react-router-dom)
  location / {
    try_files $uri $uri/ /index.html;
  }
}